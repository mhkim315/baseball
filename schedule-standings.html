<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>직관가이드</title>
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="site-header">
        <h1 id="site-title" class="brand-title">직관가이드</h1>
        <p id="site-subtitle" class="lead">구단을 선택해 주세요.</p>
        <nav id="team-selector" class="team-selector" aria-label="구단 선택"></nav>
        <nav id="section-nav" class="nav" aria-label="가이드 섹션"></nav>
      </header>
      <p id="load-error" class="error-banner" role="alert"></p>
      <main>
        <nav class="subsection-tabs" aria-label="일정·순위 보기">
          <button type="button" id="schedule-tab" data-schedule-tab="schedule" aria-controls="schedule-panel">일정</button>
          <button type="button" id="standings-tab" data-schedule-tab="standings" aria-controls="standings-panel">순위</button>
        </nav>
        <section id="schedule-panel" class="subsection-panel" aria-label="일정">
          <div class="calendar-header">
            <h2 id="schedule-title" class="visually-hidden">일정</h2>
            <div class="calendar-controls" aria-label="월 이동">
              <button type="button" id="prev-month" aria-label="이전 달">이전</button>
              <span id="calendar-current-month" class="calendar-current-month" aria-live="polite"></span>
              <button type="button" id="next-month" aria-label="다음 달">다음</button>
            </div>
          </div>
          <div class="calendar-legend" aria-label="캘린더 범례">
            <span><i class="calendar-legend-dot calendar-legend-dot--home"></i>홈</span>
            <span><i class="calendar-legend-dot calendar-legend-dot--away"></i>원정</span>
            <span><i class="calendar-legend-dot calendar-legend-dot--win"></i>승</span>
            <span><i class="calendar-legend-dot calendar-legend-dot--loss"></i>패</span>
            <span><b class="calendar-legend-dh">DH</b>더블헤더</span>
          </div>
          <div class="calendar panel" aria-label="월간 경기 일정">
            <div id="calendar-weekdays" class="calendar-weekdays" aria-hidden="true"></div>
            <div id="calendar-grid" class="calendar-grid"></div>
          </div>
        </section>
        <section id="standings-panel" class="subsection-panel" aria-label="순위" hidden>
          <h2 id="standings-title" class="visually-hidden">순위</h2>
          <div class="table-wrap panel">
            <table id="standings-table">
              <thead><tr><th>순위</th><th>팀</th><th>승률</th><th>승무패</th><th>게임차</th><th>연속</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
      </main>
      <footer class="site-footer muted">baseball_refac · 기능형 UI 보강 버전</footer>
    </div>
    <script type="module" src="js/schedule-standings-page.js"></script>
  </body>
</html>
