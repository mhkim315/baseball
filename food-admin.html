<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fullcount.kr 먹거리 좌표 관리자</title>
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>
    <div class="wrap admin-wrap">
      <header class="site-header">
        <h1 id="site-title" class="brand-title">먹거리 좌표 관리자</h1>
        <p id="site-subtitle" class="lead">매장 정보 원본은 유지하고, 층/카테고리별 마커와 매장명 배치 좌표를 별도 JSON으로 수정합니다.</p>
        <nav id="team-selector" class="team-selector" aria-label="구단 선택"></nav>
        <nav id="section-nav" class="nav" aria-label="가이드 섹션"></nav>
      </header>
      <p id="load-error" class="error-banner" role="alert"></p>
      <main class="admin-layout">
        <section class="panel admin-main" aria-labelledby="admin-map-title">
          <h2 id="admin-map-title">지도 편집</h2>
          <div class="filter-block">
            <div><strong>구장</strong><div id="admin-stadium-tabs" class="filter-tabs" role="tablist" aria-label="구장 선택"></div></div>
            <div><strong>층</strong><div id="admin-floor-tabs" class="filter-tabs" role="tablist" aria-label="층 선택"></div></div>
            <div><strong>카테고리</strong><div id="admin-category-tabs" class="filter-tabs" role="tablist" aria-label="카테고리 선택"></div></div>
          </div>
          <p class="muted">원형 마커는 드래그로 이동하고, 매장명은 선택 매장의 8방위 버튼으로 방향만 조정합니다.</p>
          <div class="admin-map-wrap"><div id="admin-map-stage" class="admin-map-stage"><img id="admin-map-image" alt="" /><div id="admin-marker-layer" class="admin-marker-layer"></div></div></div>
        </section>
        <aside class="panel admin-side" aria-labelledby="selected-store-title">
          <h2 id="selected-store-title">선택 매장</h2>
          <form id="store-form" class="store-form">
            <label>매장명 <input id="store-shop" name="shop" /></label>
            <label>메뉴 <textarea id="store-menu" name="menu" rows="3"></textarea></label>
            <label>층 <input id="store-floor" name="floor" /></label>
            <label>카테고리 <select id="store-category" name="category"><option value="chicken">치킨·닭</option><option value="korean">한·분·일</option><option value="western">피자·버거·양식</option><option value="cafe">음료·주류·간식</option></select></label>
            <label>구역 <input id="store-zone" name="zone" /></label>
            <div class="coord-grid"><label>마커 X <input id="store-left" name="leftPct" type="number" step="0.001" /></label><label>마커 Y <input id="store-top" name="topPct" type="number" step="0.001" /></label></div>
            <div class="direction-control">
              <strong>매장명 방향</strong>
              <div id="label-direction-buttons" class="direction-grid" role="group" aria-label="매장명 방향 선택"></div>
            </div>
          </form>
          <div class="admin-actions"><button type="button" id="download-json">전체 배치 JSON 다운로드</button><button type="button" id="download-stadium-json">현재 층/카테고리 JSON 다운로드</button><button type="button" id="save-json-file">food-layouts.json 저장</button></div>
          <p id="admin-status" class="muted"></p>
          <textarea id="json-output" class="json-output" rows="12" aria-label="수정된 JSON 미리보기"></textarea>
        </aside>
      </main>
    </div>
    <script type="module" src="js/food-admin-page.js"></script>
  </body>
</html>
