<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KBO 응원가 · 구단·선수·기본규칙 | 풀카운트</title>
    <meta name="description" content="KBO 10개 구단 응원가 모음. 경기 시작부터 승부처까지 상황별 응원, 선수별 응원가, 야구 기본규칙까지." />
    <meta property="og:title" content="KBO 응원가 · 구단·선수·기본규칙 | 풀카운트" />
    <meta property="og:description" content="KBO 10개 구단의 상황별 응원가와 선수별 응원가, 야구 기본규칙을 확인하세요." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fullcount.kr/cheering" />
    <link rel="stylesheet" href="css/base.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="site-header">
        <h1 id="site-title" class="brand-title">직관가이드</h1>
        <p id="site-subtitle" class="lead">구단을 선택해 주세요.</p>
        <nav id="team-selector" class="team-selector" aria-label="구단 선택"></nav>
        <nav id="section-nav" class="nav" aria-label="가이드 섹션"></nav>
      </header>
      <p id="load-error" class="error-banner" role="alert"></p>
      <main id="cheering-main" class="cheering-main">
        <nav class="subsection-tabs" aria-label="응원 하위 메뉴">
          <button type="button" data-cheering-tab="songs" aria-controls="cheering-songs-panel">구단응원가</button>
          <button type="button" data-cheering-tab="players" aria-controls="cheering-players-panel">선수응원가</button>
          <button type="button" data-cheering-tab="rules" aria-controls="cheering-rules-panel">기본규칙</button>
        </nav>
        <section id="cheering-songs-panel" class="subsection-panel" aria-label="구단응원가"></section>
        <section id="cheering-players-panel" class="subsection-panel" aria-label="선수응원가" hidden></section>
        <section id="cheering-rules-panel" class="subsection-panel" aria-label="기본규칙" hidden></section>
      </main>
      <footer class="site-footer muted">응원가 링크 추가나 수정 요청은 info@fullcount.kr 로 보내주세요</footer>
    </div>
    <script type="module" src="js/cheering-page.js"></script>
  </body>
</html>
