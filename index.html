<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="KBO 10개 구단의 실시간 라인업, 선발투수, 경기 프리뷰를 한눈에. 오늘 경기 타순과 상대 라인업을 확인하세요." />
    <meta property="og:title" content="KBO 라인업 · 선발투수 | 풀카운트" />

  <body>
    <div class="wrap">

        <h1 id="site-title" class="brand-title">직관가이드</h1>

      </main>
      <footer class="site-footer muted">기능 추가나 개선 제안은 info@fullcount.kr 로 보내주세요</footer>
