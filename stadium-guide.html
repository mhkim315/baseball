<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KBO 구장별 먹거리 · 주차 · 좌석 · 대중교통 · 예매 · 맛집 | fullcount.kr</title>
    <meta name="description" content="KBO 10개 구장 먹거리·주차·좌석·대중교통·맛집·예매 총정리. 잠실, 라팍(라이온즈파크), 위팍(KT위즈파크), 문학(랜더스필드), 챔필(기아챔피언스필드), 고척스카이돔, 사직, 한생파(한화생명볼파크), 창파(NC파크). 지하철·버스·KTX·주차 정보 포함." />
    <meta name="keywords" content="잠실야구장 대중교통,잠실야구장 지하철,잠실야구장 버스,라이온즈파크 대중교통,라팍 대중교통,위즈파크 주차,위팍 주차,문학야구장 지하철,챔필 좌석,고척스카이돔 주차,고척돔 지하철,사직야구장 지하철,사직야구장 버스,한생파 좌석,창파 맛집,KBO 구장안내" />
    <meta property="og:title" content="KBO 구장별 먹거리 · 주차 · 좌석 · 대중교통 · 예매 · 맛집 | fullcount.kr" />
    <meta property="og:description" content="잠실·라팍·위팍·문학·챔필·고척·사직·한생파·창파 — KBO 10개 구장 먹거리·주차·좌석·대중교통·맛집·예매정보." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fullcount.kr/stadium-guide" />
    <link rel="canonical" href="https://fullcount.kr/stadium-guide" />
    <link rel="stylesheet" href="css/base.css" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "fullcount.kr",
      "url": "https://fullcount.kr",
      "description": "KBO 10개 구장 좌석 · 먹거리 · 주차 · 주변 맛집 정보",
      "inLanguage": "ko-KR"
    }
    </script>
    <script id="stadium-ld-json" type="application/ld+json"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  </head>
  <body>
    <div class="wrap">
      <header class="site-header">
        <h1 id="site-title" class="brand-title">fullcount.kr</h1>
        <p id="stadium-guide-subtitle" class="lead">구장을 선택해 주세요.</p>
      </header>
      <p id="load-error" class="error-banner" role="alert"></p>
      <main>
        <section aria-label="구장안내">
          <p id="stadium-guide-subtitle" class="muted stadium-guide-subtitle"></p>
          <nav class="subsection-tabs" aria-label="구장안내 하위 메뉴">
            <button type="button" id="seat-tab" data-stadium-tab="seats" aria-controls="seat-panel">좌석</button>
            <button type="button" id="food-tab" data-stadium-tab="food" aria-controls="food-panel">먹거리</button>
            <button type="button" id="map-tab" data-stadium-tab="map" aria-controls="map-panel">주차</button>
            <button type="button" id="transit-tab" data-stadium-tab="transit" aria-controls="transit-panel">대중교통</button>
            <button type="button" id="eats-tab" data-stadium-tab="eats" aria-controls="eats-panel">주변맛집</button>
          </nav>
          <section id="seat-panel" class="subsection-panel" aria-label="좌석">
            <figure class="figure-block panel">
              <img id="seat-image" alt="" width="1000" height="1100" loading="lazy" />
            </figure>
            <section id="ticket-info" class="panel" aria-label="예매 정보" hidden>
              <h3 class="panel-heading">예매 정보</h3>
              <div id="ticket-info-body"></div>
            </section>
          </section>
          <section id="map-panel" class="subsection-panel" aria-label="주변맵" hidden>
            <div id="stadium-map-root" class="stadium-map-root panel" role="region" aria-label="구장 주변 지도"></div>
            <ul class="stadium-map-legend muted" aria-label="마커 범례">
              <li class="stadium-map-legend-item">
                <svg class="stadium-map-legend-pin-svg" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path fill="#c2410c" stroke="#ffffff" stroke-width="1.25" stroke-linejoin="round" d="M16 2C9.2 2 4 7.4 4 14.2c0 8.8 12 25.8 12 25.8s12-17 12-25.8C28 7.4 22.8 2 16 2z" />
                  <circle cx="16" cy="14.5" r="4.2" fill="#ffffff" />
                  <circle cx="16" cy="14.5" r="2" fill="#c2410c" />
                </svg>
                구장 (<code>stadium</code>)
              </li>
              <li class="stadium-map-legend-item">
                <svg class="stadium-map-legend-pin-svg" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path fill="#1d4ed8" stroke="#ffffff" stroke-width="1.25" stroke-linejoin="round" d="M16 2C9.2 2 4 7.4 4 14.2c0 8.8 12 25.8 12 25.8s12-17 12-25.8C28 7.4 22.8 2 16 2z" />
                  <circle cx="16" cy="14.5" r="4.2" fill="#ffffff" />
                  <circle cx="16" cy="14.5" r="2" fill="#1d4ed8" />
                </svg>
                주차·대안 (<code>parking</code>)
              </li>
              <li class="stadium-map-legend-item">
                <svg class="stadium-map-legend-pin-svg" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path fill="#16a34a" stroke="#ffffff" stroke-width="1.25" stroke-linejoin="round" d="M16 2C9.2 2 4 7.4 4 14.2c0 8.8 12 25.8 12 25.8s12-17 12-25.8C28 7.4 22.8 2 16 2z" />
                  <circle cx="16" cy="14.5" r="4.2" fill="#ffffff" />
                  <circle cx="16" cy="14.5" r="2" fill="#16a34a" />
                </svg>
                지하철·기차
              </li>
              <li class="stadium-map-legend-item">
                <svg class="stadium-map-legend-pin-svg" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path fill="#7c3aed" stroke="#ffffff" stroke-width="1.25" stroke-linejoin="round" d="M16 2C9.2 2 4 7.4 4 14.2c0 8.8 12 25.8 12 25.8s12-17 12-25.8C28 7.4 22.8 2 16 2z" />
                  <circle cx="16" cy="14.5" r="4.2" fill="#ffffff" />
                  <circle cx="16" cy="14.5" r="2" fill="#7c3aed" />
                </svg>
                버스정류장
              </li>
            </ul>
          </section>
          <section id="transit-panel" class="subsection-panel" aria-label="대중교통" hidden>
            <div id="transit-map-root" class="stadium-map-root panel" role="region" aria-label="대중교통 지도"></div>
            <section id="transit-detail" class="food-detail-card panel" aria-live="polite">
              <h3 class="panel-heading">대중교통 정보</h3>
              <p class="food-detail-hint">핀을 클릭하면 대중교통 상세 정보가 표시됩니다.</p>
            </section>
          </section>
          <section id="food-panel" class="subsection-panel" aria-label="먹거리" hidden>
            <div class="filter-block panel">
              <div>
                <div id="food-floor-tabs" class="filter-tabs" role="tablist" aria-label="층 선택"></div>
              </div>
              <div>
                <div id="food-category-tabs" class="filter-tabs" role="tablist" aria-label="카테고리 선택"></div>
              </div>
            </div>
            <div class="food-map-wrap panel">
              <div class="food-map-stage" id="food-map-stage">
                <img id="food-map-image" alt="" width="1000" height="1100" loading="lazy" />
                <div id="food-marker-layer" class="food-marker-layer" aria-label="매장 위치 마커"></div>
              </div>
            </div>
            <section id="food-detail" class="food-detail-card panel" aria-live="polite"></section>
            <section class="panel" aria-label="등록 매장">
              <h4 id="food-count" class="visually-hidden">등록 매장</h4>
              <ul id="food-list" class="food-list"></ul>
            </section>
          </section>
          <section id="eats-panel" class="subsection-panel" aria-label="주변맛집" hidden>
            <div class="filter-block panel" style="margin-bottom:8px">
              <div>
                <strong>카테고리</strong>
                <div id="eats-cat-tabs" class="filter-tabs" role="tablist" aria-label="음식 카테고리 선택"></div>
              </div>
            </div>
            <div id="eats-map-root" class="stadium-map-root panel" role="region" aria-label="주변맛집 지도"></div>
            <section id="eats-detail" class="food-detail-card panel" aria-live="polite"></section>
          </section>
        </section>
      </main>
      <footer class="site-footer muted">맛집 추천이나 좌석 정보 제보는 info@fullcount.kr 로 보내주세요</footer>
    </div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="js/stadium-guide-page.js"></script>
  </body>
</html>
