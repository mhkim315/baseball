name: Update KBO Data

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update data (KST 12:00~23:59 only)
        run: |
          HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$HOUR" -lt 12 ]; then
            echo "[SKIP] KST $HOUR:00 = 자정~정오, skipping"
            exit 0
          fi
          echo "[RUN] KST $HOUR:00 - updating data"
          python scripts/fetch_kbo_standings.py || echo "[WARN] standings fetch failed"
          python scripts/update_hub_data.py || echo "[WARN] hub data update failed"
          python scripts/generate_team_config.py || echo "[WARN] config generation failed"
          sed -i 's/\.png/.jpg/g' js/team-config.js
          sed -i 's/\.png/.jpg/g' data/teams/index.json
          sed -i 's/\.png/.jpg/g' data/food-places.json

          # 변경 있으면 커밋+푸시
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ js/team-config.js
          if git diff --staged --quiet; then
            echo "[DONE] No changes"
          else
            git commit -m "Auto-update"
            git push
            echo "[DONE] Pushed changes"
          fi
