name: Update KBO Data

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data update (skip midnight-noon KST)
        run: |
          KST_HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$KST_HOUR" -lt 12 ]; then
            echo "KST $KST_HOUR:00 - skipping update (자정~정오)"
            exit 0
          fi
          echo "KST $KST_HOUR:00 - running update"
          python scripts/fetch_kbo_standings.py
          python scripts/update_hub_data.py
          python scripts/generate_team_config.py
          # Fix .png -> .jpg references (deploy images are jpg)
          sed -i 's/\.png/.jpg/g' js/team-config.js
          sed -i 's/\.png/.jpg/g' data/teams/index.json
          sed -i 's/\.png/.jpg/g' data/food-places.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ js/team-config.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update [skip ci]"
            git push
          fi
