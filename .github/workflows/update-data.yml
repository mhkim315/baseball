name: Update KBO Data

on:
  schedule:
    # 25분 간격 (KST 12:00~23:59 사이만 실행, 자정~정오 스킵)
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Skip if KST midnight-noon
        run: |
          KST_HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$KST_HOUR" -lt 12 ]; then
            echo "KST $KST_HOUR:00 - skipping"
            exit 0
          fi
          echo "KST $KST_HOUR:00 - running"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data update
        run: |
          python scripts/update_hub_data.py || echo "Hub data update completed"
          python scripts/generate_team_config.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ js/team-config.js
          git diff --staged --quiet || (git commit -m "Auto-update [skip ci]" && git push)
